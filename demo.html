<!doctype html>
<html>
  <head>
    <title>Cinema Booking Demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <h2 class="text-center mb-4">🎬 Cinema Booking Demo</h2>

      <!-- ALERT -->
      <div id="alertBox" class="alert alert-success d-none"></div>

      <div class="row">
        <!-- USER -->
        <div class="col-md-4">
          <div class="card p-3 shadow">
            <h5>Create User</h5>

            <input id="name" class="form-control mb-2" placeholder="Name" />
            <input id="email" class="form-control mb-2" placeholder="Email" />

            <button class="btn btn-primary w-100" onclick="createUser()">
              Create
            </button>

            <hr />

            <label>User ID</label>
            <input id="user_id" class="form-control" />
          </div>
        </div>

        <!-- MOVIE -->
        <div class="col-md-4">
          <div class="card p-3 shadow">
            <h5>Movies</h5>

            <button class="btn btn-success w-100 mb-2" onclick="loadMovies()">
              Load Movies
            </button>

            <select id="movie_id" class="form-control"></select>
          </div>
        </div>

        <!-- SEAT -->
        <div class="col-md-4">
          <div class="card p-3 shadow text-center">
            <h5>Seats</h5>

            <button class="btn btn-warning w-100 mb-2" onclick="loadSeats()">
              Load Seats
            </button>

            <div class="bg-secondary text-white mb-2 p-1">SCREEN</div>

            <div id="seats"></div>

            <p class="mt-2">Selected Seat: <b id="selectedSeat">-</b></p>

            <button class="btn btn-dark w-100" onclick="booking()">BOOK</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      let selectedSeat = null;

      function showAlert(msg) {
        const box = document.getElementById("alertBox");
        box.innerText = msg;
        box.classList.remove("d-none");

        setTimeout(() => {
          box.classList.add("d-none");
        }, 2000);
      }

      function createUser() {
        fetch("http://localhost:8001/api/users", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            document.getElementById("user_id").value = data.id;
            showAlert("User berhasil dibuat!");
          });
      }

      function loadMovies() {
        fetch("http://localhost:8002/api/movies")
          .then((res) => res.json())
          .then((data) => {
            const select = document.getElementById("movie_id");
            select.innerHTML = "";

            data.forEach((m) => {
              let option = document.createElement("option");
              option.value = m.id;
              option.text = m.title + " - Rp" + m.price;
              select.appendChild(option);
            });
          });
      }

      function loadSeats() {
        const movieId = document.getElementById("movie_id").value;

        fetch(`http://localhost:8003/api/seats?movie_id=${movieId}`)
          .then((res) => res.json())
          .then((data) => {
            const container = document.getElementById("seats");
            container.innerHTML = "";

            data.forEach((seat) => {
              let btn = document.createElement("button");

              btn.innerText = seat.seat_number;

              btn.className =
                "btn m-1 " +
                (seat.status === "available" ? "btn-success" : "btn-danger");

              if (seat.status !== "available") {
                btn.disabled = true;
              }

              btn.onclick = () => {
                selectedSeat = seat.id;
                document.getElementById("selectedSeat").innerText =
                  seat.seat_number;
              };

              container.appendChild(btn);
            });
          });
      }

      function booking() {
        fetch("http://localhost:8004/api/bookings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            user_id: document.getElementById("user_id").value,
            movie_id: document.getElementById("movie_id").value,
            seat_id: selectedSeat,
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            showAlert("Booking berhasil!");
            loadSeats(); // refresh seat
          });
      }
    </script>
  </body>
</html>
